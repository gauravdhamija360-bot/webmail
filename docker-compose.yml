version: "3.9"

volumes:
  mongo:
  redis:
  wildduck_webmail_node_modules:

services:
  # =========================
  # DATABASES
  # =========================
  mongo:
    image: mongo
    restart: unless-stopped
    volumes:
      - ./wildduck-data/mongo:/data/db

  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - ./wildduck-data/redis:/data

  # =========================
  # MAIL CORE
  # =========================
  wildduck:
    image: ghcr.io/zone-eu/wildduck:1.45.5
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - mongo
      - redis
    volumes:
      - ./config/wildduck:/wildduck/config

    labels:
      - "traefik.enable=true"

      # ========= IMAPS (993) =========
      - "traefik.tcp.routers.wildduck-imaps.entrypoints=imaps"
      - "traefik.tcp.routers.wildduck-imaps.rule=HostSNI(`*`)"
      - "traefik.tcp.routers.wildduck-imaps.tls=true"
      - "traefik.tcp.routers.wildduck-imaps.service=wildduck-imaps"
      - "traefik.tcp.services.wildduck-imaps.loadbalancer.server.port=143"

      # ========= POP3S (995) =========
      - "traefik.tcp.routers.wildduck-pop3s.entrypoints=pop3s"
      - "traefik.tcp.routers.wildduck-pop3s.rule=HostSNI(`*`)"
      - "traefik.tcp.routers.wildduck-pop3s.tls=true"
      - "traefik.tcp.routers.wildduck-pop3s.service=wildduck-pop3s"
      - "traefik.tcp.services.wildduck-pop3s.loadbalancer.server.port=110"

  # =========================
  # OUTBOUND MAIL (SMTP SUBMISSION)
  # =========================
  zonemta:
    image: ghcr.io/zone-eu/zonemta-wildduck:1.32.20
    restart: unless-stopped
    depends_on:
      - mongo
      - redis
    volumes:
      - ./config/zone-mta:/app/config

    labels:
      - "traefik.enable=true"
      - "traefik.tcp.routers.zonemta.entrypoints=smtps"
      - "traefik.tcp.routers.zonemta.rule=HostSNI(`*`)"
      - "traefik.tcp.routers.zonemta.tls=true"
      - "traefik.tcp.routers.zonemta.service=zonemta-svc"
      - "traefik.tcp.services.zonemta-svc.loadbalancer.server.port=587"

  # =========================
  # SMTP INBOUND
  # =========================
  haraka:
    image: ghcr.io/zone-eu/haraka-plugin-wildduck:5.8.22
    restart: unless-stopped
    ports:
      - "25:25"
    depends_on:
      - mongo
      - redis
      - rspamd
    volumes:
      - ./config/haraka:/app/config
      - ./certs/HOSTNAME-key.pem:/app/config/tls_key.pem
      - ./certs/HOSTNAME.pem:/app/config/tls_cert.pem

  # =========================
  # SPAM FILTER
  # =========================
  rspamd:
    image: nodemailer/rspamd
    restart: unless-stopped
    depends_on:
      - redis

  # =========================
  # WEBMAIL
  # =========================
  wildduck-webmail:
    build: "./wildduck-webmail"
    restart: unless-stopped
    command: sh -c "npm install && npm run bowerdeps -- --allow-root && node server.js --config=/app/config/default.toml"
    env_file:
      - ./wildduck-webmail/.env
    expose:
      - "3000"
    depends_on:
      - mongo
      - redis
      - wildduck
    volumes:
      - "./wildduck-webmail:/app"
      - ./config/wildduck-webmail:/app/config
      - wildduck_webmail_node_modules:/app/node_modules

  # =========================
  # CADDY (WEB)
  # =========================
  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - wildduck-webmail
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./caddy-data:/data
      - ./caddy-config:/config

  # =========================
  # TRAEFIK (MAIL TCP ONLY)
  # =========================
  traefik:
    image: traefik:latest
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
      - "--providers.docker.exposedByDefault=false"

      - "--entrypoints.imaps.address=:993"
      - "--entrypoints.pop3s.address=:995"
      - "--entrypoints.smtps.address=:465"

      - "--log.level=INFO"

    ports:
      - "993:993"
      - "995:995"
      - "465:465"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock